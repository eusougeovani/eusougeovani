name: Atualizar README stats

on:
  schedule:
    # roda a cada 12 horas (ajuste o cron como quiser: https://crontab.guru)
    - cron: "0 */12 * * *"
  workflow_dispatch:   # permite rodar manualmente pela aba "Actions"
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache do pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script de atualização
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commitar SVGs atualizados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza estatísticas do README"
          git push
